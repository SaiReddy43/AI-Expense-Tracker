
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
 
  <defs>
    <!-- Multi-stop luxury metallic gold linear gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9A7432" />
      <stop offset="15%" stop-color="#CBA358" />
      <stop offset="30%" stop-color="#F7E5A9" />
      <stop offset="45%" stop-color="#D8B467" />
      <stop offset="60%" stop-color="#9A7432" />
      <stop offset="75%" stop-color="#F7E5A9" />
      <stop offset="100%" stop-color="#684814" />
    </linearGradient>

    <!-- Subtle drop shadow to simulate the 3D depth effect -->
    <filter id="subtleShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Solid White Background -->
  <rect width="500" height="500" fill="#080808ff" />

  <!-- Monogram Group using the Gold Gradient and Shadow -->
  <g filter="url(#subtleShadow)">
    <!-- Maximize font-size to 340 for a larger, bold display -->
    <text x="250" y="360" 
          font-family="'Times New Roman', 'Georgia', serif" 
          font-size="420" 
          font-weight="bold" 
          fill="url(#goldGradient)" 
          text-anchor="middle" 
          letter-spacing="-30">
      Jv
    </text>
  </g>
</svg>
